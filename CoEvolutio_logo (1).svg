  <mask id="imagine-text-gaps-jdefpj" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="520" fill="white"/><rect x="418" y="193.5" width="54.1640625" height="48.5" fill="black" rx="2"/><rect x="470" y="193.5" width="124.921875" height="48.5" fill="black" rx="2"/><rect x="418" y="247.5" width="154.6640625" height="17" fill="black" rx="2"/><rect x="428" y="284.5" width="111.3359375" height="17" fill="black" rx="2"/><rect x="427.9339904785156" y="306.5" width="117.53475952148438" height="17" fill="black" rx="2"/><rect x="418.53125" y="335" width="96.9375" height="16" fill="black" rx="2"/></mask></defs>

